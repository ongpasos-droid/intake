name: Deploy WP child theme

# ─────────────────────────────────────────────────────────────────
#  Despliega `web/wordpress/astra-eufunding/` al contenedor WP de
#  producción cada vez que se pushea a main y se haya tocado algo
#  dentro de esa carpeta. Reemplaza al "wp-theme-sync" que la memoria
#  del repo indicaba como pendiente.
#
#  Cómo funciona:
#    1. GitHub Actions arranca un runner Ubuntu.
#    2. Hace checkout del repo en el runner.
#    3. Carga la SSH key privada (secreto WP_SSH_PRIVATE_KEY).
#    4. Rsync incremental al servidor de producción a la ruta del
#       theme (secreto WP_THEME_PATH, p.ej. /var/www/html/wp-content/
#       themes/astra-eufunding o /opt/coolify/.../wp-content/themes/...
#       — depende de cómo monte Coolify el volumen de WP).
#
#  Secretos requeridos en GitHub (Settings → Secrets and variables → Actions):
#    - WP_SSH_HOST          IP o dominio del servidor (ej. 91.98.145.106)
#    - WP_SSH_USER          usuario SSH (típicamente root o coolify)
#    - WP_SSH_PORT          puerto SSH (default 22 — opcional)
#    - WP_SSH_PRIVATE_KEY   clave PRIVADA SSH (contenido del archivo, no la pública)
#    - WP_THEME_PATH        ruta absoluta en el servidor donde vive el theme
#                           (debe ser la carpeta `astra-eufunding` final, sin
#                            slash al final — el rsync se encarga)
#
#  Setup one-time (Oscar lo hace en su PC):
#    1. ssh-keygen -t ed25519 -f ~/.ssh/efs_wp_deploy -N ""
#    2. ssh-copy-id -i ~/.ssh/efs_wp_deploy.pub <user>@<host>
#    3. cat ~/.ssh/efs_wp_deploy           → copiar a GitHub secret WP_SSH_PRIVATE_KEY
#    4. Añadir resto de secrets al repo
#    5. git push (cualquier cambio en web/wordpress/) → este workflow corre solo
#
#  Disparo manual: en GitHub → Actions → "Deploy WP child theme" → Run workflow.
# ─────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - 'web/wordpress/astra-eufunding/**'
  workflow_dispatch:  # botón manual en la UI de GitHub Actions

concurrency:
  group: wp-theme-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Rsync theme to production
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.WP_SSH_PRIVATE_KEY }}

      - name: Trust the host
        env:
          SSH_HOST: ${{ secrets.WP_SSH_HOST }}
          SSH_PORT: ${{ secrets.WP_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Rsync theme files
        env:
          SSH_USER: ${{ secrets.WP_SSH_USER }}
          SSH_HOST: ${{ secrets.WP_SSH_HOST }}
          SSH_PORT: ${{ secrets.WP_SSH_PORT }}
          THEME_PATH: ${{ secrets.WP_THEME_PATH }}
        run: |
          PORT="${SSH_PORT:-22}"
          # --delete para que archivos borrados del repo desaparezcan en prod
          # --exclude .git por si quedó algún rastro (no debería)
          rsync -avz --delete \
            -e "ssh -p $PORT -o StrictHostKeyChecking=yes" \
            --exclude '.git' \
            web/wordpress/astra-eufunding/ \
            "$SSH_USER@$SSH_HOST:$THEME_PATH/"

      - name: Bust WP cache (best-effort)
        env:
          SSH_USER: ${{ secrets.WP_SSH_USER }}
          SSH_HOST: ${{ secrets.WP_SSH_HOST }}
          SSH_PORT: ${{ secrets.WP_SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          # Si hay wp-cli en el contenedor de WP, purgar cache. No fallar si no.
          ssh -p "$PORT" "$SSH_USER@$SSH_HOST" '
            for c in $(docker ps --format "{{.Names}}" | grep -i wordpress | head -1); do
              docker exec "$c" sh -c "command -v wp >/dev/null && wp cache flush --allow-root || true"
            done
          ' || echo "wp-cli no disponible o no aplica — sin problema, el navegador recogerá el theme nuevo en el próximo F5 (style.css versionado)."
