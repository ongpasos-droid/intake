  <!-- 18: Infinito / cacahuete -->
  <rect class="cell" x="1020" y="440" width="200" height="180"/>
  <text class="num"   x="1030" y="460">18</text>
  <g transform="translate(1120,530)">
    <path class="stk" d="M-42,0 C-42,-22 -15,-22 0,0 C15,22 40,22 40,0 C40,-22 15,-22 0,0 C-15,22 -42,22 -42,0 Z" stroke-width="6"/>
