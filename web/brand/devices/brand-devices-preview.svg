    <path class="stk" d="M35,-14 L50,-2 L38,12" stroke-width="7"/>
  </g>
  <text class="label" x="520" y="425">Flecha ondulada</text>

  <!-- 10: Flecha con punta gorda -->
  <rect class="cell" x="620" y="260" width="200" height="180"/>
  <text class="num"   x="630" y="280">10</text>
  <g transform="translate(720,350)">
    <path class="stk" d="M-55,0 L15,0" stroke-width="11"/>
    <polygon class="fil" points="10,-22 50,0 10,22"/>
  </g>
  <text class="label" x="720" y="425">Flecha punta gorda</text>

  <!-- 11: Flecha diagonal arriba-derecha -->
  <rect class="cell" x="820" y="260" width="200" height="180"/>
  <text class="num"   x="830" y="280">11</text>
  <g transform="translate(920,350)">
    <path class="stk" d="M-40,30 C-15,5 10,-15 28,-25" stroke-width="9"/>
    <polygon class="fil" points="15,-35 40,-27 25,-10"/>
  </g>
  <text class="label" x="920" y="425">Flecha diagonal</text>

  <!-- 12: Flecha lightning-zigzag -->
  <rect class="cell" x="1020" y="260" width="200" height="180"/>
  <text class="num"   x="1030" y="280">12</text>
  <g transform="translate(1120,350)">
    <path class="stk" d="M-55,-20 L-25,-20 L-35,-2 L5,-2 L-5,16 L30,16" stroke-width="7"/>
    <path class="stk" d="M22,3 L40,16 L22,28" stroke-width="7"/>
  </g>
  <text class="label" x="1120" y="425">Flecha zigzag</text>

  <!-- ═══ ROW 3 ═══ -->
  <!-- 13: Círculo suelto (como Portadilla) -->
  <rect class="cell" x="20"  y="440" width="200" height="180"/>
  <text class="num"   x="30"  y="460">13</text>
  <g transform="translate(120,530)">
    <path class="stk" d="M-45,-22 C-65,-5 -55,30 -15,35 C30,40 58,10 50,-20 C42,-42 -8,-45 -35,-28 C-48,-18 -52,5 -35,22 C-10,40 30,28 42,10" stroke-width="6"/>
  </g>
  <text class="label" x="120" y="605">Círculo suelto</text>

  <!-- 14: Círculo doble -->
  <rect class="cell" x="220" y="440" width="200" height="180"/>
  <text class="num"   x="230" y="460">14</text>
  <g transform="translate(320,530)">
    <ellipse class="stk" cx="-3" cy="-2" rx="52" ry="26" stroke-width="6"/>
