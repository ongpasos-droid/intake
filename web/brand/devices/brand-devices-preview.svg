    <path class="stk" d="M-18,2 L22,-4" stroke-width="10"/>
    <path class="stk" d="M36,-1 L62,2" stroke-width="11"/>
  </g>
  <text class="label" x="720" y="785">Highlight con huecos</text>

  <!-- 23: Comillas apertura curvas -->
  <rect class="cell" x="820" y="620" width="200" height="180"/>
  <text class="num"   x="830" y="640">23</text>
  <g transform="translate(920,710)">
    <path class="stk" d="M-18,-22 C-25,-5 -18,12 -6,18" stroke-width="10"/>
    <path class="stk" d="M16,-22 C9,-5 16,12 28,18" stroke-width="10"/>
  </g>
  <text class="label" x="920" y="785">Comillas curvas</text>

  <!-- 24: Comillas tipográficas (estilo Frase importante) -->
  <rect class="cell" x="1020" y="620" width="200" height="180"/>
  <text class="num"   x="1030" y="640">24</text>
  <g transform="translate(1120,710)">
    <ellipse class="fil" cx="-14" cy="-14" rx="6" ry="16" transform="rotate(18 -14 -14)"/>
    <ellipse class="fil" cx="4"   cy="-14" rx="6" ry="16" transform="rotate(18 4 -14)"/>
    <ellipse class="fil" cx="-4"  cy="16"  rx="6" ry="16" transform="rotate(18 -4 16)"/>
    <ellipse class="fil" cx="14"  cy="16"  rx="6" ry="16" transform="rotate(18 14 16)"/>
  </g>
