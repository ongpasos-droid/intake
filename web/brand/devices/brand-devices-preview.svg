  <rect class="cell" x="220" y="800" width="200" height="180"/>
  <text class="num"   x="230" y="820">26</text>
  <g transform="translate(320,890)">
    <path class="fil" d="M-12,-40 L-32,6 L-6,4 L-22,44 L24,-4 L-2,-2 L18,-40 Z"/>
  </g>
  <text class="label" x="320" y="965">Rayo / lightning</text>

  <!-- 27: Swirl decorativo -->
  <rect class="cell" x="420" y="800" width="200" height="180"/>
  <text class="num"   x="430" y="820">27</text>
  <g transform="translate(520,890)">
    <path class="stk" d="M32,-28 C12,-35 -25,-26 -30,2 C-35,28 8,38 28,26 C42,18 42,-2 26,-6 C12,-10 2,2 10,14" stroke-width="7"/>
  </g>
  <text class="label" x="520" y="965">Swirl decorativo</text>

  <!-- 28: Scribble X (doble trazo) -->
  <rect class="cell" x="620" y="800" width="200" height="180"/>
  <text class="num"   x="630" y="820">28</text>
  <g transform="translate(720,890)">
    <path class="stk" d="M-28,-28 C-18,-10 10,18 30,30" stroke-width="7"/>
    <path class="stk" d="M-30,-18 C-12,-5 18,14 28,20" stroke-width="4"/>
    <path class="stk" d="M-28,30 C-10,14 14,-10 30,-28" stroke-width="7"/>
    <path class="stk" d="M-28,20 C-8,8 10,-10 28,-20" stroke-width="4"/>
  </g>
  <text class="label" x="720" y="965">Scribble X</text>

  <!-- 29: Check mark orgánico -->
  <rect class="cell" x="820" y="800" width="200" height="180"/>
  <text class="num"   x="830" y="820">29</text>
  <g transform="translate(920,890)">
    <path class="stk" d="M-35,2 C-22,18 -12,22 -2,16 C10,8 22,-12 28,-28 C30,-32 32,-30 30,-22" stroke-width="10"/>
  </g>
  <text class="label" x="920" y="965">Check orgánico</text>

  <!-- 30: Sparkle / estrella 4 puntas -->
  <rect class="cell" x="1020" y="800" width="200" height="180"/>
  <text class="num"   x="1030" y="820">30</text>
  <g transform="translate(1120,890)">
    <path class="fil" d="M0,-38 C3,-12 5,-6 8,-4 C20,-2 32,1 36,3 C10,6 4,8 2,10 C0,24 -2,30 -3,38 C-6,14 -8,8 -10,6 C-24,4 -30,2 -38,-1 C-14,-4 -8,-6 -6,-8 C-4,-22 -2,-28 0,-38 Z"/>
  </g>
  <text class="label" x="1120" y="965">Sparkle estrella</text>

  <!-- Footer -->
  <text class="sub" x="30" y="1020">Archivo: web/brand/devices/brand-devices-preview.svg · Abre en navegador para ver a tamaño real.</text>
  <text class="sub" x="30" y="1040">Respóndeme con: "me gustan 2, 5, 13, 26..." y descarto el resto.</text>
