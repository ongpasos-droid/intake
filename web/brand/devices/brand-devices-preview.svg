  <!-- ═══ ROW 5 ═══ -->
  <!-- 25: Splash / estrella irregular -->
  <rect class="cell" x="20"  y="800" width="200" height="180"/>
  <text class="num"   x="30"  y="820">25</text>
  <g transform="translate(120,890)">
    <path class="fil" d="M0,-38 L14,-12 L38,-16 L20,4 L38,26 L6,22 L-4,42 L-16,22 L-38,26 L-24,4 L-38,-16 L-14,-12 Z"/>
