  <!-- ═══ ROW 2 ═══ -->
  <!-- 07: Flecha recta gruesa -->
  <rect class="cell" x="20"  y="260" width="200" height="180"/>
  <text class="num"   x="30"  y="280">07</text>
  <g transform="translate(120,350)">
