<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 1080" font-family="Poppins, sans-serif">
  <style>
    .num   { font-size: 13px; font-weight: 800; fill: #1b1464; opacity: 0.55; }
    .label { font-size: 10px; font-weight: 500; fill: #474551; text-anchor: middle; }
    .title { font-size: 20px; font-weight: 800; fill: #1b1464; }
    .sub   { font-size: 11px; font-weight: 500; fill: #474551; }
    .cell  { fill: none; stroke: #eeeeee; stroke-width: 1; }
    .stk   { fill: none; stroke: #fbff12; stroke-linecap: round; stroke-linejoin: round; }
    .fil   { fill: #fbff12; stroke: none; }
  </style>

  <rect width="1240" height="1080" fill="#ffffff"/>
  <text class="title" x="30" y="38">Brand devices amarillos — 30 variantes</text>
  <text class="sub"   x="30" y="58">Color #fbff12 · Dime qué números te gustan y cuáles descartas. Trazo orgánico, no geométrico.</text>

  <!-- ═══ ROW 1 ═══ -->
  <!-- 01: Subrayado pincelada recta -->
  <rect class="cell" x="20"  y="80" width="200" height="180"/>
  <text class="num"   x="30"  y="100">01</text>
  <g transform="translate(120,165)">
    <path class="stk" d="M-70,3 C-45,-2 -20,6 0,2 C25,-3 50,5 70,-1" stroke-width="10"/>
  </g>
  <text class="label" x="120" y="245">Subrayado recto</text>

  <!-- 02: Subrayado curvo (sonrisa) -->
  <rect class="cell" x="220" y="80" width="200" height="180"/>
  <text class="num"   x="230" y="100">02</text>
  <g transform="translate(320,165)">
    <path class="stk" d="M-70,-8 Q0,22 70,-5" stroke-width="9"/>
  </g>
  <text class="label" x="320" y="245">Subrayado curvo</text>

  <!-- 03: Subrayado doble -->
  <rect class="cell" x="420" y="80" width="200" height="180"/>
  <text class="num"   x="430" y="100">03</text>
  <g transform="translate(520,165)">
    <path class="stk" d="M-60,-6 C-35,-2 5,-10 60,-3" stroke-width="6"/>
    <path class="stk" d="M-55,12 C-25,8 20,16 55,10" stroke-width="5"/>
  </g>
  <text class="label" x="520" y="245">Subrayado doble</text>

  <!-- 04: Subrayado zigzag -->
  <rect class="cell" x="620" y="80" width="200" height="180"/>
  <text class="num"   x="630" y="100">04</text>
  <g transform="translate(720,165)">
    <path class="stk" d="M-60,5 L-36,-8 L-12,7 L12,-8 L36,7 L60,-5" stroke-width="6"/>
  </g>
  <text class="label" x="720" y="245">Subrayado zigzag</text>

  <!-- 05: Subrayado con swoop final -->
  <rect class="cell" x="820" y="80" width="200" height="180"/>
  <text class="num"   x="830" y="100">05</text>
  <g transform="translate(920,165)">
    <path class="stk" d="M-70,10 C-40,4 -10,-2 30,2 Q55,3 60,-25" stroke-width="9"/>
  </g>
  <text class="label" x="920" y="245">Subrayado con swoop</text>

  <!-- 06: Subrayado tapered (grosor variable stack) -->
  <rect class="cell" x="1020" y="80" width="200" height="180"/>
  <text class="num"   x="1030" y="100">06</text>
  <g transform="translate(1120,165)">
