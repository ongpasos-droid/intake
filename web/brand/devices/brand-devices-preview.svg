  <!-- 08: Flecha curva (como Texto e imagen 2) -->
  <rect class="cell" x="220" y="260" width="200" height="180"/>
  <text class="num"   x="230" y="280">08</text>
  <g transform="translate(320,350)">
    <path class="stk" d="M-55,-25 Q-30,25 40,15" stroke-width="9"/>
    <polygon class="fil" points="20,0 50,18 28,28"/>
